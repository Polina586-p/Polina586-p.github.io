<!DOCTYPE html>
<html lang="ru">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Таблицы</title>
<style>
table {
	width: 300px;
	border: 1px solid gray;
	margin: 20px;
	float: left;
}
td, th {
	border: 1px solid gray;
	padding: 30px;
}
</style>
</head>
<body>
	<table>
		<caption>1-я таблица</caption>
        <tbody>
            <tr>
                <th colspan="">1</th>
            </tr>
            <tr>
                <td>3</td>
                <td>4</td>
            </tr>
		
	    </tbody>
	</table>
</body>
</html>
