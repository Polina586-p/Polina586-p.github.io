<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Четыре таблицы</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-wrap: wrap;
            gap: 40px;
            padding: 20px;
            background-color: #f4f4f4;
        }
        .table-container {
            text-align: center;
        }
        table {
            border-collapse: collapse;
            background-color: white;
            width: 250px;
            height: 250px;
        }
        td {
            border: 2px solid #999;
            text-align: center;
            vertical-align: middle;
            font-weight: bold;
            font-size: 1.2em;
            width: 80px;
            height: 80px;
        }
        h3 {
            margin-bottom: 10px;
            font-weight: normal;
        }
    </style>
</head>
<body>

    <!-- 1-я таблица -->
    <div class="table-container">
        <h3>1-я таблица</h3>
        <table>
            <tr>
                <td rowspan="2">1</td>
                <td colspan="2">2</td>
            </tr>
            <tr>
                <td>5</td>
                <td>6</td>
            </tr>
        </table>
    </div>

    <!-- 2-я таблица -->
    <div class="table-container">
        <h3>2-я таблица</h3>
        <table>
            <tr>
                <td colspan="2">1</td>
            </tr>
            <tr>
                <td rowspan="2">3</td>
                <td>4</td>
            </tr>
            <tr>
                <td>6</td>
            </tr>
        </table>
    </div>

    <!-- 3-я таблица -->
    <div class="table-container">
        <h3>3-я таблица</h3>
        <table>
            <tr>
                <td>1</td>
                <td rowspan="3">2</td>
            </tr>
            <tr>
                <td>3</td>
            </tr>
            <tr>
                <td>5</td>
            </tr>
        </table>
    </div>

    <!-- 4-я таблица -->
    <div class="table-container">
        <h3>4-я таблица</h3>
        <table>
            <tr>
                <td colspan="2">1</td>
            </tr>
            <tr>
                <td>3</td>
                <td>4</td>
            </tr>
            <tr>
                <td colspan="2">5</td>
            </tr>
        </table>
    </div>

</body>
</html>
